<div class="auth-container">
  <div class="card">
    <h2>Login</h2>
    
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username">Usuário</label>
        <input 
          type="text" 
          id="username" 
          [(ngModel)]="loginData.username" 
          name="username" 
          required
          placeholder="Digite seu usuário">
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input 
          type="password" 
          id="password" 
          [(ngModel)]="loginData.password" 
          name="password" 
          required
          placeholder="Digite sua senha">
      </div>

      <span *ngIf="errorMessage" class="error-msg">{{ errorMessage }}</span>

      <button type="submit" class="btn btn-primary" [disabled]="!loginData.username || !loginData.password">
        ENTRAR
      </button>

      <button type="button" class="btn btn-link" routerLink="/register">
        Não tem conta? Registre-se
      </button>
    </form>
  </div>
</div>
